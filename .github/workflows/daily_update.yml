name: Daily History & Backtest

on:
  schedule:
    # Runs at 12:00 UTC (8:00 AM EST) every day
    - cron: '0 12 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3 pandas numpy yfinance scipy python-dotenv requests plotly

    - name: Run Daily History & Backtests
      env:
        MASSIVE_S3_ID: ${{ secrets.MASSIVE_S3_ID }}
        MASSIVE_S3_KEY: ${{ secrets.MASSIVE_S3_KEY }}
        MASSIVE_S3_ENDPOINT: ${{ secrets.MASSIVE_S3_ENDPOINT }}
        MASSIVE_S3_BUCKET: ${{ secrets.MASSIVE_S3_BUCKET }}
      run: |
        echo "=== Step 1: Downloading Yesterday's OPRA Data ==="
        python flatfiles_updater.py
        
        echo "=== Step 2: Appending 1Y History ==="
        python flatfiles_updater_upgrade.py 
        
        echo "=== Step 3: Re-calculating PnL Backtests ==="
        python build_pnl_summary_upgrade.py

    - name: Commit Daily Updates
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add massive_historical_options_data/*.csv
        git add massive_historical_1y_data/*.csv
        git add pnl_backtest_results.csv
        git diff --quiet && git diff --staged --quiet || git commit -m "Daily History Update"
        git push