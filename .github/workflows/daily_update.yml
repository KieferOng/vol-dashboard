name: Daily OPRA Flatfile Updater

on:
  schedule:
    # Runs at 10:00 AM UTC (6:00 AM EST) every Tuesday through Saturday.
    - cron: '0 10 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3 pandas numpy yfinance scipy python-dotenv

    - name: Run Daily ETL Updater
      env:
        MASSIVE_S3_ID: ${{ secrets.MASSIVE_S3_ID }}
        MASSIVE_S3_KEY: ${{ secrets.MASSIVE_S3_KEY }}
        MASSIVE_S3_ENDPOINT: ${{ secrets.MASSIVE_S3_ENDPOINT }}
        MASSIVE_S3_BUCKET: ${{ secrets.MASSIVE_S3_BUCKET }}
      run: python flatfiles_updater.py

    - name: Commit and Push Updated CSVs
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add massive_historical_options_data/*.csv
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || git commit -m "Automated OPRA data update: $(date +'%Y-%m-%d')"
        git push