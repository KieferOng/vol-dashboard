name: Hourly Intraday Spreads

on:
  schedule:
    # Runs hourly from 13:00 to 20:00 UTC (9:00 AM to 4:00 PM EST), Mon-Fri
    - cron: '0 13-20 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scan-spreads:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance scipy python-dotenv requests

    - name: Run Intraday Spread Scanner
      env:
        MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      run: |
        echo "=== Scanning Live Spreads ==="
        python build_spreads_upgrade.py

    - name: Commit Hourly Spreads
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add live_spread_execution.csv
        git diff --quiet && git diff --staged --quiet || git commit -m "Hourly Spreads Update"
        git push